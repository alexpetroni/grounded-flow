name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly eval ratchet (03:17 UTC — off the top-of-hour rush).
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  ci:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Hoist the secret into an env var: the `secrets` context is NOT allowed in a
    # step-level `if:`, but `env` is. Empty string when the secret is unset.
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Authenticate to Docker Hub so Testcontainers image pulls (postgres/redis/
      # qdrant/ryuk) and Docker build base images are not throttled by the shared
      # runner's anonymous pull-rate limit. No-op until the DOCKERHUB_* secrets are set.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Coverage gate: vitest.config.ts enforces ≥80% lines on libs/core,
      # libs/rag, libs/database (CLAUDE.md quality gates).
      - name: Test (unit + integration, coverage gate)
        run: pnpm test:cov

      - name: Docker build (api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: rag-api:ci

      - name: Docker build (worker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          tags: rag-worker:ci

      - name: E2E (full-stack happy path, mocked providers)
        run: pnpm test:e2e

      # Product-level gate: compose stack up with fake providers, exercise
      # health → events → ingest → grounded RAG query → chat SSE.
      - name: Smoke (compose stack)
        run: |
          cp .env.example .env
          SMOKE_DOWN=1 bash scripts/smoke.sh

  # Separate, non-blocking eval (CLAUDE.md: manual dispatch + nightly). Runs
  # keyless by default (sparse retrieval vs the recorded baseline ratchet).
  eval:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Eval (baseline ratchet)
        run: pnpm eval
