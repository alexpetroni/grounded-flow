# Launches the Claude Code agent that builds this repository.
#
#   export ANTHROPIC_API_KEY=sk-ant-...        # or put it in .env
#   docker compose -f docker-compose.builder.yml run --rm builder
#
# Notes:
# - The repo is mounted at the SAME absolute host path inside the container so that
#   Compose bind mounts in the app stack resolve correctly when the agent runs
#   `docker compose up` against the host daemon (docker-out-of-docker).
# - The host Docker socket is mounted so the agent can build/run the app stack and
#   the test containers (docker-first verification).
# - To build just one phase:  PHASE=2 docker compose -f docker-compose.builder.yml run --rm builder

services:
  builder:
    build:
      context: .
      dockerfile: docker/builder/Dockerfile
    image: rag-builder:latest
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in your shell or .env}
      REPO_DIR: ${PWD}
      PHASE: ${PHASE:-}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-RAG Builder}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-builder@rag.local}
    volumes:
      # Mount the repo at the same path the host sees (keeps DooD bind mounts valid).
      - ${PWD}:${PWD}
      # Host Docker daemon, for running the app stack + test containers.
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: ${PWD}
    # The agent runs long; keep stdin/tty for interactive runs.
    stdin_open: true
    tty: true
