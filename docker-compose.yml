services:
  postgres:
    image: postgres:16-bookworm
    mem_limit: 1g
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-bookworm
    mem_limit: 512m
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.13.6
    mem_limit: 1g
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: ["node", "scripts/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Probe the app's real health (dependency checks), not just the TCP port.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/health').then((r) => r.json()).then((d) => process.exit(d.status === 'ok' ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Give in-flight requests time to drain on shutdown (enableShutdownHooks).
    stop_grace_period: 30s
    mem_limit: 1g
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Liveness via heartbeat file: stale mtime means the event loop is wedged.
      test:
        [
          "CMD",
          "node",
          "-e",
          "const s = require('fs').statSync('/tmp/worker-heartbeat'); process.exit(Date.now() - s.mtimeMs < 30000 ? 0 : 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # BullMQ drains in-flight jobs on SIGTERM; embedding/ingest jobs are slow —
    # don't SIGKILL them after Docker's default 10s.
    stop_grace_period: 60s
    mem_limit: 1g
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
